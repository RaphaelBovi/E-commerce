spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:${PGHOST:postgres}}:${DB_PORT:${PGPORT:5432}}/${DB_NAME:${PGDATABASE:ecommerce}}
    username: ${DB_USER:${PGUSER:postgres}}
    password: ${DB_PASSWORD:${PGPASSWORD:postgres}}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://ecommerce-dashboard-wfvy.onrender.com,https://ecommerce-frontend.onrender.com}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}