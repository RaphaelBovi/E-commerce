spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:${PGHOST:postgres}}:${DB_PORT:${PGPORT:5432}}/${DB_NAME:${PGDATABASE:ecommerce}}
    username: ${DB_USER:${PGUSER:postgres}}
    password: ${DB_PASSWORD:${PGPASSWORD:postgres}}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://ecommerce-dashboard-wfvy.onrender.com,https://ecommerce-frontend-ro7u.onrender.com}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  mail:
    from: ${MAIL_FROM:no-reply@sualoja.com}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
