spring.application.name=Rapha

# ── Servidor ──────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Banco de dados PostgreSQL ─────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecommerce}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────
# validate: Hibernate verifica o schema contra as entidades, sem alterar nada.
# Flyway é responsável por criar e migrar o schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway — migrações de schema versionadas ─────────────────────
# baseline-on-migrate=true: banco existente sem flyway_schema_history recebe baseline V0.
# validate-on-migrate=false: não re-valida checksums de migrations já aplicadas;
#   evita abort em cenários de encoding inconsistente entre deploys.
# encoding=UTF-8: garante leitura correta de SQL com caracteres especiais.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false
spring.flyway.encoding=UTF-8

# ── JWT ───────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production-min-256-bits}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── CORS — origens permitidas (separadas por vírgula) ────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://ecommerce-dashboard-wfvy.onrender.com,http://localhost:5174,http://localhost:5173}

# ── Email ─────────────────────────────────────────────────────────
# spring.mail.* configurado nos profiles (application-prod.yml tem as credenciais reais).
# Sem config de mail, JavaMailSender não é criado e EmailService usa fallback dev (log).
app.mail.from=${MAIL_FROM:noreply@sualoja.com}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Google OAuth + reCAPTCHA ──────────────────────────────────────
app.google.client-id=${GOOGLE_CLIENT_ID:}
google.recaptcha.secret=${GOOGLE_RECAPTCHA_SECRET:}

# ── Master admin seed ─────────────────────────────────────────────
app.master.email=${APP_MASTER_EMAIL:}
app.master.password=${APP_MASTER_PASSWORD:}
app.master.fullName=${APP_MASTER_FULL_NAME:Master Admin}

# ── PagSeguro ─────────────────────────────────────────────────────
# api-url padrão aponta para sandbox — trocar para https://api.pagseguro.com em produção real
pagseguro.token=${PAGSEGURO_TOKEN:}
pagseguro.api-url=${PAGSEGURO_API_URL:https://sandbox.api.pagseguro.com}
pagseguro.webhook-secret=${PAGSEGURO_WEBHOOK_SECRET:}
pagseguro.notification-url=${PAGSEGURO_NOTIFICATION_URL:}
pagseguro.redirect-url=${PAGSEGURO_REDIRECT_URL:http://localhost:5173/minha-conta}

# ── Melhor Envio ──────────────────────────────────────────────────
melhorenvio.token=${MELHOR_ENVIO_TOKEN:}
melhorenvio.api-url=${MELHOR_ENVIO_API_URL:https://melhorenvio.com.br}
melhorenvio.origin-zip=${MELHOR_ENVIO_ORIGIN_ZIP:13417730}

# ── Cloudinary CDN (imagens de produto) ──────────────────────────
# Sem esta variável, imagens são mantidas em base64 (fallback dev)
cloudinary.url=${CLOUDINARY_URL:}

# ── Mercado Pago ──────────────────────────────────────────────────
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
mercadopago.notification-url=${MERCADOPAGO_NOTIFICATION_URL:}
mercadopago.redirect-url=${MERCADOPAGO_REDIRECT_URL:http://localhost:5173/minha-conta}

# ── Frontend URL (usado em emails de carrinho abandonado) ─────────
app.frontend.url=${APP_FRONTEND_URL:https://sualoja.com.br}
