spring.application.name=Rapha

# ── Banco de dados PostgreSQL (Render) ───────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────
# validate: Hibernate verifica que o schema do banco bate com as entidades,
# mas não altera nada. O Flyway é responsável por criar e migrar o schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Hibernate 7: desabilita busca de metadados via JDBC para determinar o dialeto
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# ── Flyway — migrações de schema versionadas ─────────────────────
# baseline-on-migrate=true: se o banco já tem tabelas (sem flyway_schema_history),
# cria a tabela de histórico e aplica apenas as migrations após o baseline.
# baseline-version=0: V1 em diante serão aplicadas normalmente.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# ── CORS — origens permitidas (separadas por vírgula) ───────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://ecommerce-dashboard-wfvy.onrender.com,http://localhost:5174,http://localhost:5173}

# ── Master admin seed (sobrescrever via env vars no Render) ──────
app.master.email=${APP_MASTER_EMAIL:}
app.master.password=${APP_MASTER_PASSWORD:}
app.master.fullName=${APP_MASTER_FULL_NAME:Master Admin}

# ── PagSeguro Webhook — chave secreta HMAC-SHA256 ────────────────
# Configurar no Render como env var PAGSEGURO_WEBHOOK_SECRET
# Se vazio (desenvolvimento local), a verificação é pulada com aviso no log
pagseguro.webhook-secret=${PAGSEGURO_WEBHOOK_SECRET:}

# ── Melhor Envio ──────────────────────────────────────────────────
# Token Bearer gerado em melhorenvio.com.br → Integrações → Tokens
# Escopos: shipping-calculate, shipping-generate, shipping-print,
#          shipping-share, shipping-tracking
# CEP de origem: 13417-730
melhorenvio.token=${MELHOR_ENVIO_TOKEN:}
melhorenvio.api-url=${MELHOR_ENVIO_API_URL:https://melhorenvio.com.br}
melhorenvio.origin-zip=${MELHOR_ENVIO_ORIGIN_ZIP:13417730}

# ── Cloudinary CDN (imagens de produto) ──────────────────────────
# Formato: cloudinary://api_key:api_secret@cloud_name
# Sem esta variável, imagens são mantidas em base64 (fallback dev)
cloudinary.url=${CLOUDINARY_URL:}

# ── Mercado Pago ──────────────────────────────────────────────────
# Credenciais em: mercadopago.com/developers → Suas integrações → Credenciais
# Para sandbox use o Access Token de teste; para produção use o de produção
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
mercadopago.notification-url=${MERCADOPAGO_NOTIFICATION_URL:}
mercadopago.redirect-url=${MERCADOPAGO_REDIRECT_URL:http://localhost:5173/minha-conta}
