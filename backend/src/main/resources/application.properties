spring.application.name=Rapha

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Master admin seed (override via env vars APP_MASTER_EMAIL / APP_MASTER_PASSWORD in production)
app.master.email=${APP_MASTER_EMAIL:}
app.master.password=${APP_MASTER_PASSWORD:}
app.master.fullName=${APP_MASTER_FULL_NAME:Master Admin}
