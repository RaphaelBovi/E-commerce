spring.application.name=Rapha

# ── Banco de dados PostgreSQL (Render) ───────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Master admin seed (sobrescrever via env vars no Render) ──────
app.master.email=${APP_MASTER_EMAIL:}
app.master.password=${APP_MASTER_PASSWORD:}
app.master.fullName=${APP_MASTER_FULL_NAME:Master Admin}
