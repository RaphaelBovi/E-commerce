spring:
  application:
    name: ecommerce
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
server:
  port: ${PORT:${SERVER_PORT:8080}}
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production-min-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  mail:
    from: ${MAIL_FROM:no-reply@sualoja.com}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
pagseguro:
  token: ${PAGSEGURO_TOKEN:}
  api-url: ${PAGSEGURO_API_URL:https://sandbox.api.pagseguro.com}
  notification-url: ${PAGSEGURO_NOTIFICATION_URL:}
  redirect-url: ${PAGSEGURO_REDIRECT_URL:http://localhost:5173/minha-conta}