# Banco H2 em memória para testes — sem dependência de PostgreSQL externo
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate cria o schema automaticamente para testes (Flyway desabilitado)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=true

# Desabilita Flyway nos testes (schema gerenciado pelo ddl-auto=create-drop)
spring.flyway.enabled=false

# Desabilita envio real de e-mail
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# JWT mínimo para testes
app.jwt.secret=test-secret-key-minimum-256-bits-long-for-hmac-sha256
app.jwt.expiration-ms=3600000

# Google client-id — vazio para testes
app.google.client-id=

# reCAPTCHA — modo teste (aceita qualquer token)
app.recaptcha.secret=test-secret
app.recaptcha.enabled=false

# Valores irrelevantes para testes unitários de service
SPRING_DATASOURCE_URL=
SPRING_DATASOURCE_USERNAME=sa
SPRING_DATASOURCE_PASSWORD=
